<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXONET v3.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[999] flex items-center justify-center p-4 bg-slate-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-slate-200">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold mb-6">EXONET <span class="text-indigo-600">v3.9</span></h1>
            <input type="password" id="auth-key" 
                class="w-full px-4 py-4 bg-slate-100 rounded-xl mb-4 text-center font-bold text-xl outline-none border-2 border-transparent focus:border-indigo-500 transition-all" 
                placeholder="Clave: admin">
            <button onclick="login()" id="btn-login" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">
                ENTRAR AHORA
            </button>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-bold text-slate-800"><i class="fas fa-wallet mr-2 text-indigo-600"></i>Mi Exonet</h2>
            <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-power-off"></i></button>
        </header>

        <main class="p-4">
            <div class="grid grid-cols-1 gap-4 mb-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-indigo-600">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Saldo Disponible</p>
                    <h4 id="stat-balance" class="text-3xl font-bold text-slate-800">$0</h4>
                </div>
            </div>

            <button onclick="toggleModal(true)" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg mb-6">+ NUEVO REGISTRO</button>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase">
                        <tr>
                            <th class="px-4 py-3">Concepto</th>
                            <th class="px-4 py-3 text-right">Monto</th>
                            <th class="px-4 py-3 text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h3 class="font-bold text-xl mb-4">Registro Manual</h3>
            <input type="text" id="f-name" class="w-full p-4 bg-slate-100 rounded-xl mb-3 outline-none" placeholder="¿En qué? (ej: Comida)">
            <input type="number" id="f-amount" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none font-bold" placeholder="Monto $0.00">
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="saveRecord('income')" class="bg-emerald-500 text-white py-4 rounded-xl font-bold">INGRESO</button>
                <button onclick="saveRecord('expense')" class="bg-rose-500 text-white py-4 rounded-xl font-bold">GASTO</button>
            </div>
            <button onclick="toggleModal(false)" class="w-full mt-4 text-slate-400 font-bold text-sm">Cancelar</button>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('exonet_v4')) || [];
        
        function login() {
            const key = document.getElementById('auth-key').value.toLowerCase().trim();
            if (key === "admin") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                renderTable();
            } else {
                alert("Clave incorrecta. Prueba con: admin");
            }
        }

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        function saveRecord(type) {
            const name = document.getElementById('f-name').value;
            const amount = parseFloat(document.getElementById('f-amount').value);
            
            if(!name || !amount) return alert("Llena todos los campos");

            const data = {
                id: Date.now(),
                name: name,
                amount: amount,
                type: type
            };

            records.unshift(data);
            localStorage.setItem('exonet_v4', JSON.stringify(records));
            renderTable();
            toggleModal(false);
            document.getElementById('f-name').value = '';
            document.getElementById('f-amount').value = '';
        }

        function deleteRecord(id) {
            if(confirm("¿Borrar este registro?")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('exonet_v4', JSON.stringify(records));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let total = 0;

            records.forEach(r => {
                if(r.type === 'income') total += r.amount;
                else total -= r.amount;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-4 font-semibold text-slate-700">${r.name}</td>
                    <td class="px-4 py-4 text-right font-bold ${r.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${r.type === 'income' ? '+' : '-'}$${r.amount.toLocaleString()}
                    </td>
                    <td class="px-4 py-4 text-center">
                        <button onclick="deleteRecord(${r.id})" class="text-slate-300"><i class="fas fa-times-circle"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-balance').innerText = '$' + total.toLocaleString();
        }
    </script>
</body>
</html>
